version: '3.8'

services:
  discovery-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: discovery-server
    ports:
      - "8761:8761"
    networks:
      - qma-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8761/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: api-gateway
    ports:
      - "8080:8080"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      # Gateway CORS uses this array of frontend urls
      - FRONTEND_URLS=${APP_FRONTEND_URL:-http://localhost:5173}
    networks:
      - qma-network
    depends_on:
      - discovery-server

  user-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: user-service
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      # Overriding database credentials to point to AWS RDS via your environment variables
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL:-jdbc:mysql://localhost:3306/quantity_db}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      # Loading Application Secrets
      - JWT_SECRET=${JWT_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      # The frontend URL for the OAuth Redirect
      - APP_FRONTEND_URL=${APP_FRONTEND_URL:-http://localhost:5173}
    networks:
      - qma-network
    depends_on:
      - discovery-server

  measurement-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: measurement-service
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL:-jdbc:mysql://localhost:3306/quantity_db}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - qma-network
    depends_on:
      - discovery-server

networks:
  qma-network:
    driver: bridge
