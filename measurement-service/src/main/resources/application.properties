# Basic App Info
spring.application.name=measurement-service
server.port=8081

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# MySQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/quantity_db
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Logging
logging.level.root=INFO
logging.level.com.app.quantitymeasurement=DEBUG

# Disable default UserDetailsService password log
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# JWT
jwt.expiration=86400000

# OAuth2 post-login redirect (your frontend callback)
app.oauth2.redirect-uri=http://localhost:5173/oauth/callback

# Frontend URL
app.frontend.url=http://localhost:5173

# Actuator
management.endpoints.web.exposure.include=health,metrics

# Swagger
springdoc.swagger-ui.enabled=true

spring.config.import=optional:classpath:application-secrets.properties

# ========== GOOGLE OAUTH2 ==========
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/login/oauth2/code/google